<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Audios Alabanza LBDS</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body data-page="audios">
    <header>
      <nav aria-label="Navegación principal">
        <a href="https://www.ilbd.org" aria-label="Ir al inicio">
          <img
            src="https://static.wixstatic.com/media/95b25e_d289fa0f3172439088b98ce491dd27a7~mv2.png/v1/crop/x_0,y_94,w_2749,h_1624/fill/w_145,h_85,al_c,q_85,usm_0.66_1.00_0.01,enc_avif,quality_auto/Logo%20la%20biblia%20dice-01.png"
            alt="Logo Iglesia La Biblia Dice"
            class="nav-logo"
          />
        </a>
        <button
          class="nav-toggle"
          aria-label="Abrir menú"
          aria-expanded="false"
        >
          ☰
        </button>
        <ul class="nav-links" role="list">
          <li>
            <a href="https://www.ilbd.org" class="nav-item" aria-current="page"
              >Inicio</a
            >
          </li>
          <li>
            <a href="https://www.ilbd.org/nosotros" class="nav-item"
              >Nosotros <span class="arr" aria-hidden="true">▾</span></a
            >
          </li>
          <li>
            <a href="https://www.ilbd.org/discipulado" class="nav-item"
              >Discipulado <span class="arr" aria-hidden="true">▾</span></a
            >
          </li>
          <li>
            <a href="https://www.ilbd.org/universitarioslbd" class="nav-item"
              >Ministerios</a
            >
          </li>
          <li>
            <a href="https://www.ilbd.org/áreas-de-servicio" class="nav-item"
              >Servicio</a
            >
          </li>
          <li>
            <a href="https://www.ilbd.org/iglesiasobras" class="nav-item"
              >Iglesias &amp; Obras
              <span class="arr" aria-hidden="true">▾</span></a
            >
          </li>
          <li><a href="#" class="nav-item">Más...</a></li>
        </ul>
        <a
          href="https://www.ilbd.org/english"
          class="nav-lang"
          lang="en"
          hreflang="en"
          >English🌍</a
        >
      </nav>
    </header>

    <main class="audios-page">
      <section class="audios-search">
        <h1 id="media-title">Recursos de audio</h1>
        <p id="media-subtitle">Busca y ordena tu contenido.</p>

        <section
          id="media-preview"
          class="media-preview hidden"
          aria-live="polite"
        ></section>

        <div class="audios-controls">
          <input
            id="audio-search"
            type="search"
            placeholder="Buscar..."
            aria-label="Buscar recurso"
          />
          <button
            id="sort-btn"
            type="button"
            aria-label="Ordenar alfabéticamente"
          >
            Ordenar A → Z
          </button>
        </div>
        <p id="audio-count">0 elementos encontrados</p>
      </section>

      <section
        id="audio-results"
        class="audio-list"
        aria-live="polite"
      ></section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
