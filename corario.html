<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Corario LBDS</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body data-page="corario">
    <!-- ── ENCABEZADO Y NAVEGACIÓN ── -->
    <header>
      <nav aria-label="Navegación principal">
        <a href="./index.html" aria-label="Ir al inicio">
          <img
            src="./images/Logo La Biblia dice Suba color negro.png"
            alt="Logo Iglesia La Biblia Dice Suba"
            class="nav-logo"
          />
        </a>
        <button
          class="nav-toggle"
          aria-label="Abrir menú"
          aria-expanded="false"
        >
          ☰
        </button>
        <section id="navButtons" class="nav-links">
          <a href="./index.html" class="nav-item" aria-current="page"
            >Inicio
          </a>
          <a href="./calendario.html" class="nav-item">Calendario </a>
          <a href="./oraciones.html" class="nav-item">Discipulado</a>
        </section>
      </nav>
    </header>

    <main class="audios-page">
      <section class="audios-search">
        <h1 id="media-title">Corario</h1>
        <section
          id="media-preview"
          class="media-preview hidden"
          aria-live="polite"
        ></section>

        <div class="audios-controls">
          <input
            id="audio-search"
            type="search"
            placeholder="Buscar corario..."
            aria-label="Buscar recurso"
          />
        </div>
        <p id="audio-count">0 elementos encontrados</p>
      </section>

      <section
        id="audio-results"
        class="audio-list"
        aria-live="polite"
      ></section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
