<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Presentaciones LBDS</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body data-page="presentaciones">
    <header>
      <nav aria-label="Navegación principal">
        <a href="https://www.ilbd.org" aria-label="Ir al inicio">
          <img
            src="https://static.wixstatic.com/media/95b25e_d289fa0f3172439088b98ce491dd27a7~mv2.png/v1/crop/x_0,y_94,w_2749,h_1624/fill/w_145,h_85,al_c,q_85,usm_0.66_1.00_0.01,enc_avif,quality_auto/Logo%20la%20biblia%20dice-01.png"
            alt="Logo Iglesia La Biblia Dice"
            class="nav-logo"
          />
        </a>
        <button
          class="nav-toggle"
          aria-label="Abrir menú"
          aria-expanded="false"
        >
          ☰
        </button>
        <section id="navButtons" class="nav-links">
          <a href="./index.html" class="nav-item" aria-current="page"
            >Inicio
          </a>
          <a href="./calendario.html" class="nav-item">Calendario </a>
          <a href="./oraciones.html" class="nav-item">Discipulado</a>
        </section>
      </nav>
    </header>

    <main class="audios-page">
      <section class="audios-search">
        <h1 id="media-title">Presentaciones</h1>

        <section
          id="media-preview"
          class="media-preview hidden"
          aria-live="polite"
        ></section>

        <div class="audios-controls">
          <input
            id="audio-search"
            type="search"
            placeholder="Buscar presentaciones..."
            aria-label="Buscar recurso"
          />
        </div>
        <p id="audio-count">0 elementos encontrados</p>
      </section>

      <section
        id="audio-results"
        class="audio-list"
        aria-live="polite"
      ></section>
    </main>

    <script src="./script.js"></script>
  </body>
  <footer>
    <small
      >COPYRIGHT © 2026
      <a href="https://lbdsdevpage.github.io/LBD-WEB-PAGE/">lbd-s</a></small
    >
  </footer>
</html>
